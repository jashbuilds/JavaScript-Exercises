<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet">
        <style> body{font-family: 'Poppins', sans-serif;} </style>
        <title>JS Exercise 1</title>
    </head>
    <body>

        <h1>JavaScript Exercise 1</h1>

        <form id="demo">
            <label for="charInput">Enter Characters</label> <br>
            <input type="text" placeholder="Type Here" id="charInput"> <br>
            <p>The Count of Characters: <span id="charCount">0</span></p> <br> 

            <label for="name">Name: &nbsp;</label>
            <input type="text" placeholder="Enter Name" id="name"> <br> <br>

            <label for="age">Age: &nbsp;</label>
            <input type="text" placeholder="Enter Age" id="age"> <br> <br>
            
            <button type="button" id="submitBtn">Submit</button> <br>
            
            <p>Data in Object Format: <span id="showObj">-</span></p>

            <label for="dataArr">Data in array format:</label><br>
            <textarea name="dataArr" id="dataArr" rows="10" cols="50"></textarea>
            

        </form>


        <script src="./script.js"></script>
    </body>
</html>
