    <body class="main">

        <h1>JS Exercise 6</h1>

        <form>
            <h4>1.Take one text input field and click on submit button test
                whether the first character of a string is uppercase or
                not.</h4>
            <label for="testChar">Enter String:</label> &nbsp;
            <input type="text" id="testChar" name="testChar" required>
            <button type="submit" id="submitStr">Submit</button>
            <p>Check Uppercase for first letter: <span id="uppercaseChar"></span> </p><br>

            <h4>2. Take one text input field and put one button named "copy",
                click on button copy a string to the clipboard.</h4>
                <label for="copyChar">Enter String to make a copy:</label> &nbsp;
                <input type="text" name="copyChar" id="copyChar">
                <button type="submit" id="submitCopy">Copy</button> <br>
                <p id="copyMsg"></p>
        </form>

        <script src="./script.js"></script>
    </body>
</html>
